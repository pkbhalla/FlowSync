{% extends "base.html" %}
{% block title %}Analytics{% endblock %}
{% block breadcrumb %}Analytics{% endblock %}
{% block content %}
<h2 class="fw-600 mb-6">Analytics</h2>
<div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px">
  <div class="card"><div class="card-header"><h3 class="card-title">Weekly Completions</h3></div><div class="card-body" style="height:280px"><canvas id="weekly-chart"></canvas></div></div>
  <div class="card"><div class="card-header"><h3 class="card-title">Tasks by Project</h3></div><div class="card-body" style="height:280px"><canvas id="project-chart"></canvas></div></div>
</div>
<div class="card"><div class="card-header"><h3 class="card-title">Team Throughput (This Month)</h3></div><div class="card-body" style="height:280px"><canvas id="throughput-chart"></canvas></div></div>
{% endblock %}
{% block scripts %}<script src="https://unpkg.com/chart.js@4.4.8/dist/chart.umd.js"></script><script src="{{ url_for('static', filename='js/charts.js') }}"></script>{% endblock %}
