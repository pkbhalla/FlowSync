name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: promptwarschennai-495105
  REGION: us-central1
  SERVICE: flowsync

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Authorize Docker
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: Build and Push Container
        run: |
          # Note: ensure you have created an Artifact Registry repository named 'flowsync-repo'
          docker build -t ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/flowsync-repo/flowsync:${{ github.sha }} .
          docker push ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/flowsync-repo/flowsync:${{ github.sha }}

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/flowsync-repo/flowsync:${{ github.sha }}
          env_vars: |
            FLASK_ENV=production
            DATABASE_URL=sqlite:////tmp/flowsync.db
          env_vars_update_strategy: merge
          secrets: |
            SECRET_KEY=SECRET_KEY:latest
            GOOGLE_CLIENT_ID=GOOGLE_CLIENT_ID:latest
            GOOGLE_CLIENT_SECRET=GOOGLE_CLIENT_SECRET:latest
            GEMINI_API_KEY=GEMINI_API_KEY:latest
